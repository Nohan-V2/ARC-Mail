<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARC Mail</title>
    <link rel="shortcut icon" href="./images/favicon.png" type="image/x-icon" />
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main>
      <div class="navigate">
        <div class="left-nav">
          <button>
            <div class="svg-hover">
              <img src="./images/favicon/Arc.svg" alt="Arc" />
            </div>
          </button>

          <button>
            <div class="svg-hover">
              <img src="./images/favicon/Window.svg" alt="sidebar" />
            </div>
          </button>
        </div>

        <button>
          <div class="svg-hover">
            <img src="./images/favicon/Panels.svg" alt="panels" />
          </div>
        </button>

        <div class="right-nav">
          <button>
            <div class="svg-hover">
              <img
                src="./images/favicon/pen-to-square.svg"
                alt="pen to square"
              />
            </div>
          </button>
        </div>
      </div>

      <div class="search">
        <input
          type="search"
          name=""
          id=""
          placeholder="Rechercher une discussion..."
        />
      </div>

      <div class="sidebar">
        <grid>
          <div class="favourite">
            <img src="./images/" alt="instagram" />
          </div>

          <div class="favourite">
            <img src="./images/" alt="discord" />
          </div>

          <div class="favourite">
            <img src="./images/" alt="snapchat" />
          </div>
        </grid>

        <div class="space">
          <img src="./images/spaces/Code.svg" alt="tiktok" />

          <p></p>
        </div>

        <div class="pinned">
          <img src="./images/social/instagram.png" alt="instagram" />

          <h2>Nohan</h2>

          <span>00:00</span>

          <p>Je suis passé radiant...</p>
        </div>

        <div class="footer">
          <div class="spaces">
            <button>
              <div class="svg-hover">
                <img src="./images/spaces/Code.svg" alt="code" />
              </div>
            </button>
          </div>

          <div class="add">
            <button>
              <div class="svg-hover">
                <img src="./images/favicon/Add.svg" alt="add" />
              </div>
            </button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
