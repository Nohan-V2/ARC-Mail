<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARC Mail</title>
    <link rel="shortcut icon" href="./images/favicon.png" type="image/x-icon" />
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main>
      <div class="sidebar">
        <div class="navigate">
          <div class="left-nav">
            <div class="svg-hover">
              <img src="./images/favicon/Arc.svg" alt="Arc" />
            </div>

            <div class="svg-hover">
              <img src="./images/favicon/Window.svg" alt="sidebar" />
            </div>
          </div>

          <div class="right-nav">
            <div class="svg-hover">
              <img src="./images/favicon/Panels.svg" alt="panels" />
            </div>

            <div class="svg-hover">
              <img
                src="./images/favicon/pen-to-square.svg"
                alt="pen to square"
              />
            </div>
          </div>
        </div>

        <div class="search">
          <input
            type="search"
            name=""
            id=""
            placeholder="Rechercher une discussion..."
          />
        </div>

        <grid>
          <div class="favourite">
            <img src="./images/" alt="instagram" />
          </div>

          <div class="favourite">
            <img src="./images/" alt="discord" />
          </div>

          <div class="favourite">
            <img src="./images/" alt="snapchat" />
          </div>
        </grid>

        <div class="space">
          <img src="./images/spaces/Code.svg" alt="tiktok" />

          <p></p>
        </div>

        <div class="pinned">
          <div class="left-pinned">
            <img src="./images/social/instagram.png" alt="instagram" />

            <h2>Nohan</h2>

            <p>Je suis passé radiant...</p>
          </div>

          <span>00:00</span>
        </div>

        <div class="footer">
          <div class="spaces">
            <div class="svg-hover">
              <img src="./images/spaces/Code.svg" alt="code" />
            </div>
          </div>

          <div class="add">
            <div class="svg-hover">
              <img src="./images/favicon/Add.svg" alt="add" />
            </div>
          </div>
        </div>
      </div>

      <div class="screen">
        <div class="message">
          <div class="header">
            <div class="left-profil">
              <img src="" alt="" />

              <h2>Nohan</h2>
            </div>

            <span>00:00</span>
          </div>

          <hr />

          <div class="main-screen">
            <div class="chat">
              <img src="" alt="" />

              <h2>Nohan</h2>

              <span>00:00</span>

              <span>
                <p></p>
              </span>
            </div>

            <div class="write-zone">
              <input type="text" name="" id="" />
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
