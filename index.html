<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARC Mail</title>
    <link rel="shortcut icon" href="./images/favicon.png" type="image/x-icon" />
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main>
      <div class="sidebar">
        <div class="navigate">
          <div class="left-nav">
            <div class="svg-hover">
              <img src="./images/favicon/Arc.svg" alt="Arc" />
            </div>

            <div class="svg-hover">
              <img src="./images/favicon/Sidebar.svg" alt="Sidebar" />
            </div>
          </div>

          <div class="right-nav">
            <div class="svg-hover">
              <img src="./images/favicon/Columns.svg" alt="Columns" />
            </div>

            <div class="svg-hover">
              <img src="./images/favicon/Pen-square.svg" alt="Pen-square" />
            </div>
          </div>
        </div>

        <div class="search-onglet">
          <div class="search">
            <input
              type="search"
              name=""
              id=""
              placeholder="Rechercher une discussion..."
            />
          </div>

          <grid>
            <div class="favourite">
              <img
                src="./images/social/Divann mon quoicoubibou.jpg"
                alt="profil"
              />
            </div>

            <div class="favourite">
              <img
                src="./images/social/Divann mon quoicoubibou.jpg"
                alt="profil"
              />
            </div>

            <div class="favourite">
              <img
                src="./images/social/Divann mon quoicoubibou.jpg"
                alt="profil"
              />
            </div>
          </grid>
        </div>

        <div class="onglets">
          <div class="space-top">
            <img src="./images/spaces/Code.svg" alt="Code" />

            <p>Pro</p>
          </div>

          <div class="pinned">
            <div class="pinned-folder">
              <input type="button">
              <img src="./images/social/instagram.svg" alt="instagram" />

              <p>Instgram</p>

              <div class="svg-hover">
                <img src="./images/favicon/arrow-down.svg" alt="" />

                <img src="./images/favicon/arrow-up.svg" alt="" />
                </input>
              </div>
            </div>

            <div class="pinned-folder">
              <input type="button">
              <img src="./images/social/discord.svg" alt="discord" />

              <p>Discord</p>

              <div class="svg-hover">
                <img src="./images/favicon/arrow-down.svg" alt="" />

                <img src="./images/favicon/arrow-up.svg" alt="" />
                </input>
              </div>
            </div>

            <div class="pinned-folder">
              <input type="button">
              <img src="./images/social/messages.svg" alt="messages" />

              <p>Messages</p>

              <div class="svg-hover">
                <img src="./images/favicon/arrow-down.svg" alt="" />

                <img src="./images/favicon/arrow-up.svg" alt="" />
                </input>
              </div>
            </div>

            <div class="pinned-folder">
              <input type="button">
              <img src="./images/social/snapchat.svg" alt="snapchat" />

              <p>Snapchat</p>

              <div class="svg-hover">
                <img src="./images/favicon/arrow-down.svg" alt="" />

                <img src="./images/favicon/arrow-up.svg" alt="" />
                </input>
              </div>
            </div>

            <div class="pinned-folder">
              <input type="button">
              <img src="./images/social/whatsapp.svg" alt="whatsapp" />

              <p>WhatsApp</p>

              <div class="svg-hover">
                <img src="./images/favicon/arrow-down.svg" alt="" />

                <img src="./images/favicon/arrow-up.svg" alt="" />
                </input>
              </div>
            </div>

            <div class="pinned-folder">
              <input type="button">
              <img src="./images/social/gmail.svg" alt="gmail" />

              <p>Gmail</p>

              <div class="svg-hover">
                <img src="./images/favicon/arrow-down.svg" alt="" />

                <img src="./images/favicon/arrow-up.svg" alt="" />
                </input>
              </div>
            </div>

            <div class="pinned-tab">
              <h2>Nohan</h2>

              <p>Je suis passé radiant...</p>

              <span>00:00</span>
            </div>
          </div>
        </div>

        <div class="footer">
          <div class="spaces-bottom">
            <div class="svg-hover">
              <img src="./images/spaces/Code.svg" alt="code" />
            </div>
          </div>

          <div class="add">
            <div class="svg-hover">
              <img src="./images/favicon/Plus.svg" alt="Plus" />
            </div>
          </div>
        </div>
      </div>

      <div class="screen">
        <div class="message">
          <div class="header">
            <div class="left-profil">
              <img src="./images/social/Divann mon quoicoubibou.jpg" alt="" />

              <h2>Nohan</h2>

              <span>00:00</span>
            </div>
          </div>

          <hr />

          <div class="main-screen">
            <div class="chat">
              <img src="" alt="" />

              <h2>Nohan</h2>

              <span>00:00</span>

              <span>
                <p></p>
              </span>
            </div>

            <div class="write-zone">
              <input type="text" name="" id="" />
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
