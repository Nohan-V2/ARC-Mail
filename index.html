<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARC Mail</title>
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main>
      <div class="navigate">
        <div class="left-nav">
          <div class="svg-hover">
            <img src="./images/Arc.svg" alt="Arc" />
          </div>

          <div class="svg-hover">
            <img src="./images/favicon/Window.svg" alt="sidebar" />
          </div>
        </div>

        <div class="right-nav">
          <div class="svg-hover">
            <img src="./images/favicon/pen-to-square.svg" alt="" />
          </div>

          <div class="svg-hover">
            <img src="./images/favicon/Panels.svg" alt="panels" />
          </div>
        </div>
      </div>

      <div class="search">
        <input type="search" name="" id="" />
      </div>

      <div class="sidebar">
        <grid>
          <div class="favourite">
            <img src="" alt="" />
          </div>

          <div class="favourite">
            <img src="" alt="" />
          </div>

          <div class="favourite">
            <img src="" alt="" />
          </div>
        </grid>

        <div class="space">
          <img src="" alt="" />

          <p></p>
        </div>

        <div class="pinned">
          <img src="" alt="" />

          <p></p>
        </div>

        <div class="footer">
          <div class="spaces">
            <div class="svg-hover">
              <img src="" alt="" />
            </div>
          </div>

          <div class="add">
            <div class="svg-hover">
              <img src="" alt="" />
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
